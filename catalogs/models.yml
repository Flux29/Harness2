# Advisory catalog (ADR-0022): machine-level model/provider policy. The
# `defaults` block is coherence-checked by evals/agentic-smoke
# (test_workspace_coherence.py); the provider entries are advisory.
version: 1
defaults:
  # [D→C] the catalog records the VERIFIED workspace floor (ADR-0022).
  compatibility_python: "3.12.x"
  # ADR-0022 acceptance note / ISSUE-6: the floor unifies on 3.13 once exit
  # gate 6 passes — aspiration stays labeled as target, never blended in.
  target_floor_python: "3.13.x"
  latest_python_experiment: "3.14.x"
providers:
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    default_model: z-ai/glm-5.2
    use_for:
      - all live inference across the workspace (decided default — ADR-0003, plan step 3.4)
    rules:
      - Do not hard-code API keys.
      - TestModel is the only non-5.2 path, and only in offline tests.
  nvidia:
    base_url_env: NVIDIA_BASE_URL
    api_key_env: NVIDIA_API_KEY
    default_base_url: https://integrate.api.nvidia.com/v1
    use_for:
      - direct inference experiments
      - OpenAI-compatible API smoke tests
    rules:
      - Verify model availability before use.
      - Do not hard-code API keys.
      - Keep project examples provider-switchable.
  local:
    provider: ollama
    use_for:
      - private prompts
      - offline fallback
      - cheap iteration
      - embeddings (never route embeddings to a reasoning provider)
  openai:
    use_for:
      - Codex-native workflows
      - high-reliability structured outputs
  anthropic:
    use_for:
      - Claude Code workflows
      - cross-agent comparison
