  crit-obsolete-fiction:
    status: changed              # Phase 1.6 — README/PDR stop presenting Obsolete/ as repo structure
    step: "1.6"
    matrix_rows: []
    verified_by: "README layout table no longer lists Obsolete/; parking policy restated local-only/gitignored/never-pushed in README + PDR"
  crit-vendor-provenance:
    status: changed              # Phase 1.6 — provenance recorded + CI job
    step: "1.6"
    matrix_rows: []
    verified_by: "VENDOR.txt pins upstream f2224c5 (0.3.34); vendor-integrity provenance step runs revendor_check.py vs the pinned clone (arms when repo var UPSTREAM_REPO is set)"
  crit-no-license:
    status: changed              # Phase 1.3 — MIT LICENSE added
    step: "1.3"
    matrix_rows: []
    verified_by: "root LICENSE present (MIT); scope noted in README layout table"
  crit-no-ci:
    status: changed              # Phase 0.3 — CI now exists
    step: "0.3"
    matrix_rows: []
    verified_by: ".github/workflows/harnessgates.yml present and running"
  crit-422-encoding:
    status: changed              # Phase 3.2 — the one intentional wire diff
    step: "3.2"
    matrix_rows: ["C:422-body"]
    tests:
      - "projects/agent-web/tests/test_e2e_agui.py::test_422_body_is_json_object"
  crit-retry-coverage:
    status: changed              # Phase 4.2 — embeddings on the shared retrying transport
    step: "4.2"
    matrix_rows: []
    tests:
      - "projects/eval-optimizer/tests/test_retry_transport.py::test_memory_embed_client_rides_retrying_transport"
      - "projects/eval-optimizer/tests/test_retry_transport.py::test_sync_retrying_client_uses_tenacity_transport"
    note: >-
      memory_pg's embedding client now uses a sync twin of the shared
      tenacity-retrying httpx transport (same 429/5xx/Retry-After policy).
      The provider:model pass-through branch keeps pydantic-ai's own
      transport; the models.py docstring claim was NARROWED to say so
      (the plan allowed either resolution — the lie is what was banned).
      memory_pg re-entered pyright scope with its 9 type errors fixed
      (psycopg sql.Identifier composition + fetchone guards); ISSUE-3 closed.
  crit-fork-config-scatter:
    status: changed              # Phase 3.5 — fork knobs centralized per project (values unchanged)
    step: "3.5"
    matrix_rows: []
    tests:
      - "projects/agent-web/tests/test_settings_flags.py::test_fork_config_centralized_defaults"
      - "projects/eval-optimizer/tests/test_smoke.py::test_fork_config_centralized"
  crit-port-contradiction:
    status: changed              # Phase 2.2 — living smoke extracted to RUNBOOK; HANDOFF frozen
    step: "2.2"
    matrix_rows: []
    verified_by: "docs/RUNBOOK-smoke.md is the living :8801 procedure; agent-web README ports fixed to 8801; doc-grep bans port 8000 outside frozen HANDOFF"

  # ============================= Minor ==============================
  crit-dead-code-strata:
    status: identical            # ADR decision, Phase 6.5
    step: "6.5"
    matrix_rows: []
  crit-scratchpad-committed:
    status: removed              # Phase 0.1a — docs/Deep_Agents.MD excluded pre-commit
    step: "0.1a"
    matrix_rows: []
