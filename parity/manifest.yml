    step: "6.6"
    matrix_rows: []

  # ===================== Discovered (post-§8) ======================
  # Not in HarnessCritique.md §8 — surfaced during Phase 0.2 baseline capture.
  # `source` marks it so Gate 2 lint one accepts it outside the catalog.
  disc-mcp-config-cwd-relative:
    status: identical
    source: phase-0-baseline-capture
    step: "4.7"                  # later-phase decision, NOT a Phase 0 fix
    matrix_rows: ["D:deployment-config"]
    note: >-
      Settings.mcp_config defaults to the RELATIVE path "mcp.json", so which
      servers register depends on the process CWD. The deployment launches with
      CWD=projects/agent-web (Start-AgentWeb.ps1 -WorkingDirectory $root), where
      mcp.json resolves and the deployed roster enables all four
      {context7, deepwiki, github, logfire} (logfire is a stdio server defined in
      mcp.json) — matching the PDR's claimed roster, nothing ignored. But launched
      from any other CWD, the relative default silently drops mcp.json's
      logfire/postgres and build_registry only log.warnings the now-"unknown"
      names. This CWD-dependence (not a roster gap) is the real finding; an
      earlier baseline-capture run from the repo root hit exactly this and showed
      logfire "ignored". Whether to resolve mcp_config relative to the package (or
      require an absolute MCP_CONFIG) is a later-phase decision (4.7), not a Phase
      0 fix. Baseline: baseline/endpoints-v1/debug-mcp.deployed.json.

# relocations — populated only if ADR 6.5 chooses relocation over deletion.
# Each entry: <old dotted path>: <new dotted path>. Gate 2 lint one verifies the
# old path no longer resolves and the new path does; Gate 1 AST-matches each.
relocations: {}
