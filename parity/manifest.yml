      window correct). Pending approvals derived from trailing unreturned
      ToolCallParts; id parity with live AG-UI interrupts pinned by
      test_pending_interrupt_parity. Matrix D endpoints additive-only.
  feat-improve-loop:
    status: changed
    source: post-refactor-feature
    step: "post-6"
    matrix_rows: []
    tests:
      - "projects/agent-web/tests/test_deps_factory.py::test_make_deps_seeds_shared_context_files"
      - "projects/agent-web/tests/test_improve_run.py::test_stage_sessions_layout"
      - "projects/agent-web/tests/test_improve_run.py::test_cli_zero_sessions_is_offline_noop"
      - "projects/agent-web/tests/test_improve_run.py::test_proposals_target_the_shared_context_dir"
    note: >-
      Deterministic self-improvement loop. The vendor improve tool is
      agent-callable only and pointed at a sessions dir agent-web never
      writes; first live session confirmed the gap (urllib-over-web_search
      pattern went uncaptured). Three additive pieces: agent_web/improve_run
      (stages state/history into the analyzer layout, runs on settings.model,
