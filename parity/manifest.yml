      thread workspace by make_deps (copy-if-missing-or-stale) so applied
      proposals reach future threads, and scripts/Register-ImproveTask.ps1
      (nightly Task Scheduler trigger, report-only). Workspace layout gains
      seeded context files — additive; Matrix D slug mapping unchanged.
    status: changed
    source: gate-6-live-session
    step: "6-exit"
    matrix_rows: []
    tests:
      - "projects/eval-optimizer/tests/test_forking.py::test_default_fork_test_command_imports_root_modules"
      - "projects/agent-web/tests/test_settings_flags.py::test_default_fork_test_command_imports_root_modules"
    note: >-
      Gate-6 live find, first live outing of ADR-0018's shared-suite metric —
      two stacked defects in the default FORK_TEST_COMMAND ("pytest -q"):
      (1) the pytest console script does not put the snapshot cwd on sys.path,
      so the shared suite under tests/ could never import a branch's
      root-level implementation modules; (2) after switching to -m, bare
      "python" resolved (vendor runner: shlex.split + create_subprocess_exec,
      no shell) to uv's managed base interpreter with no pytest installed.
      Either way EVERY honest branch scored 0.00/None and the fork always
      aborted. Default is now the absolute running interpreter (as_posix) +
      "-m pytest -q". Report shape and selection semantics unchanged.
      SECOND SITE (post-merge): agent-web's settings.py carried the same
      "pytest -q" default; fixed identically. Matrix A unaffected — the fork
      knobs are 3.5-additive, absent from the v1 settings baseline.
  disc-422-serialization-crash:
    status: changed
    source: gate-6-live-session
    step: "6-exit"
    matrix_rows: ["C:422-body"]
    tests:
      - "projects/agent-web/tests/test_e2e_agui.py::test_422_with_non_utf8_body_still_json"
    note: >-
      Gate-6 live find: a malformed request body carrying invalid UTF-8 crashed
      e.json() inside the 3.2-fixed 422 handler — the client got a raw 500
      instead of the contractual 422 JSON error object. Fixed with a safe
      fallback (error list without input bytes, include_input=False); the
      well-formed 422 path is byte-identical to the 3.2 behavior.
  disc-mcp-config-cwd-relative:
    status: changed              # Phase 4.7 — MCP_CONFIG anchors to the project root
    source: phase-0-baseline-capture
    step: "4.7"
    matrix_rows: ["D:deployment-config", "A:mcp_config"]
    tests:
      - "projects/agent-web/tests/test_settings_flags.py::test_mcp_config_default_is_cwd_independent"
      - "projects/agent-web/tests/test_settings_flags.py::test_mcp_config_relative_env_anchors_to_project"
      - "projects/agent-web/tests/test_settings_flags.py::test_mcp_config_absolute_env_taken_as_is"
    resolution: >-
      Decided in 4.7: a relative MCP_CONFIG (incl. the default mcp.json)
      resolves against the project root, absolute paths taken as-is. Under
      the deployed launch (CWD = projects/agent-web) this is the SAME file
      as v1 — the deployed roster baseline is unchanged; from any other CWD
      the roster no longer silently shrinks. Matrix A mcp_config row flipped
      with the 4.7 citation (v1 witness kept).
    note: >-
      Settings.mcp_config defaults to the RELATIVE path "mcp.json", so which
      servers register depends on the process CWD. The deployment launches with
      CWD=projects/agent-web (Start-AgentWeb.ps1 -WorkingDirectory $root), where
      mcp.json resolves and the deployed roster enables all four
      {context7, deepwiki, github, logfire} (logfire is a stdio server defined in
      mcp.json) — matching the PDR's claimed roster, nothing ignored. But launched
      from any other CWD, the relative default silently drops mcp.json's
      logfire/postgres and build_registry only log.warnings the now-"unknown"
      names. This CWD-dependence (not a roster gap) is the real finding; an
      earlier baseline-capture run from the repo root hit exactly this and showed
      logfire "ignored". Whether to resolve mcp_config relative to the package (or
      require an absolute MCP_CONFIG) is a later-phase decision (4.7), not a Phase
      0 fix. Baseline: baseline/endpoints-v1/debug-mcp.deployed.json.

  disc-agent-endpoint-csrf:
    status: changed
    source: phase-6-adr-0020
    step: "6.4"
    matrix_rows: []
    tests:
      - "projects/agent-web/tests/test_security_posture.py::test_verified_cross_origin_driveby_now_403"
      - "projects/agent-web/tests/test_security_posture.py::test_rebinding_host_refused"
      - "projects/agent-web/tests/test_security_posture.py::test_token_required_when_set"
      - "projects/agent-web/tests/test_security_posture.py::test_same_origin_json_ok"
    note: >-
      Surfaced by ADR-0020's composed-posture assessment and VERIFIED live: with
      CORS locked to the bundled UI origin, a browser simple request (text/plain
      + foreign Origin, no preflight) POSTed to /agent was fully processed
      (200, run completed, history written) — CORS gates the response, not the
      side effect. Fixed by app._authorize before the handler: content-type must
      be application/json (removes the simple-request bypass so CORS preflight
      engages), Origin must be same-origin or allowlisted, Host must be loopback
      (rebinding defense), and an optional AGENT_TOKEN bearer (required beyond
      loopback). CORS methods/headers narrowed from "*". No Matrix row moves:
      the guard only adds 403 refusals to illegitimate requests; the SSE /
      interrupt happy paths (Matrix C) are unchanged.

  disc-abort-action-unsupported:
    status: changed
    source: phase-4-e2e
    step: "4.6"
    matrix_rows: ["B:any_viable"]
    tests:
      - "projects/eval-optimizer/tests/test_forking.py::test_no_passing_branch_aborts"
      - "projects/eval-optimizer/tests/test_forking.py::test_e2e_fork_timeout_cancels_real_branches"
    note: >-
      Surfaced by the exit-gate-4 fork-timeout E2E test (which 4.5's logging
      made visible). v1's no-passing-branch path called
      merge_or_select("abort") — an action the vendor API never supported
      (only 'pick:<id>'); the ValueError fell into the bare except and the
      JUDGE quietly merged a winner on a path whose stated intent was
      "no branch passed, abort". Fixed to the real abort API,
      coordinator.abort_fork(): discard all branches, merge nothing, so
      any_viable=False now genuinely means no winner was merged. The
      exception-driven judge fallback itself is untouched (ADR 6.2 owns it).
      The 4.0 fake coordinator wrongly accepted 'abort'; it now mirrors the
      real API and raises.

