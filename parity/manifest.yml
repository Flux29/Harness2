    status: removed              # Phase 0.1a — reg export, body.json, tsbuildinfo excluded pre-commit
    step: "0.1a"
    matrix_rows: []
  crit-aspirational-catalogs:
    status: identical            # Phase 6.6
    step: "6.6"
    matrix_rows: []
  crit-python-floors:
    status: identical            # Phase 6.6
