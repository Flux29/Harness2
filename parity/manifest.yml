# parity/manifest.yml — the canonical state of the refactor (Gate 2)
#
# Every finding id from parity/findings-catalog.yml (the enumeration of
# HarnessCritique.md §8) MUST have an entry here (lint one / completeness).
#
# status:
#   identical  — not yet remediated, OR remediated with no behavioral parity-row
#                movement and no code change (parity harness sees zero diff).
#   changed    — behavior changed on purpose. REQUIRES matrix_rows AND either a
#                named passing pytest (tests:) or a non-pytest CI hook
#                (verified_by:). This is lint two.
#   removed    — the subject was deleted from the tree (exclusion / dead-code
#                removal). No test required.
#
# fields:
#   step         — the plan step that owns the finding.
#   matrix_rows  — Parity Matrix rows this finding moves (A:/B:/C:/D:/E: keys).
#   tests        — pytest node-ids that pin the change (checked to exist).
#   verified_by  — a CI job / artifact that verifies a non-behavioral fix.
#
# THE FLIP PROTOCOL: an entry moves off `identical` in the SAME commit that
# lands the change, never before, never after. A PR that changes behavior
# without flipping its entry — or flips an entry without a verifier — fails CI.

findings:
  # ============================ Critical ============================
  crit-checkpoint-persistence:
    status: changed              # ADR-0019 — durable per-thread FileCheckpointStore
    step: "6.3"
    matrix_rows: ["D:checkpoint-store"]
    tests:
      - "projects/agent-web/tests/test_checkpoints.py::test_checkpoints_survive_across_requests"
      - "projects/agent-web/tests/test_checkpoints.py::test_checkpoints_live_outside_agent_workspace"
      - "projects/agent-web/tests/test_checkpoints.py::test_vendor_prune_cap_default_pinned"
    note: >-
      ADR-0019 (Accepted 2026-07-06): Option A at the storage layer —
      make_deps wires FileCheckpointStore(state/checkpoints/<slug>) per
      thread, so checkpoints and fork:<id> anchors survive across requests
      and restarts (the stateless AG-UI layer's hard prerequisite for the
      planned deepresearch->CopilotKit port; provenance of ADR-0015's claim
      confirmed in the vendor reference app). Matrix D gains the checkpoint
      files in the server-only state tree (outside every LocalBackend root,
      gitignored, same trust boundary as 5.1 history). The rewind
      endpoints/RewindRequested handling/UI are ISSUE-4 (tracked successor);
      growth bounded by the vendor's max_checkpoints=20 auto-prune (pinned).
  crit-history-agent-writable:
    status: changed              # Phase 5.1 — server-only history via parallel-run
    step: "5.1"
    matrix_rows: ["D:history-location"]
    tests:
      - "projects/agent-web/tests/test_e2e_agui.py::test_agent_workspace_cannot_see_history"
      - "projects/agent-web/tests/test_e2e_agui.py::test_history_persisted_server_side"
      - "projects/agent-web/tests/test_e2e_agui.py::test_dual_write_window_writes_both_copies"
      - "projects/agent-web/tests/test_e2e_agui.py::test_dual_write_divergence_is_loud"
      - "projects/agent-web/tests/test_e2e_agui.py::test_dual_write_reads_stay_on_v1_copy"
    note: >-
      Authoritative history moved to STATE_DIR/history/<slug>.json — a sibling
      of workspaces/, outside every LocalBackend root (D:history-location row
      flipped; message SCHEMA row unchanged). Parallel-run, not cutover:
      HISTORY_DUAL_WRITE=1 opens the window (write both, diff previous pair on
      every save, divergence -> ERROR log + ledger the live parity run asserts
      empty; reads stay on the v1 copy). Cutover = remove the flag after N=5
      clean sessions; the Gate 4 allowlist entry 5b2b397a0757feed expires
      2026-08-15 and CI now arms expiry (--today). Migration: no one-shot
      relocation — the window migrates active threads (each save writes the
      full message list); dormant threads restart fresh after cutover.
  crit-fork-exec-gate:
    status: changed              # Phase 5.2 — both host-exec paths now explicitly gated
    step: "5.2"
    matrix_rows: []
    tests:
      - "projects/agent-web/tests/test_agent_build.py::test_fork_disabled_by_default_no_fork_toolset"
      - "projects/agent-web/tests/test_agent_build.py::test_fork_flag_enables_fork_toolset"
      - "projects/eval-optimizer/tests/test_forking.py::test_host_exec_requires_env_acknowledgment"
    note: >-
      The contract: LLM-generated code does not execute on the host without
      explicit approval or explicit configuration. agent-web: forking is now
      env-gated like its siblings (FORKING=1, default OFF — the harness offers
      no interrupt hook for test_command, so the honest gate is the flag + a
      README warning symmetrical to the browser one); with the flag off the
      agent's toolset carries no fork tools. eval-optimizer: the headless path
      keeps host execution but requires EVALOPT_ALLOW_HOST_EXEC=1 — the
      docstring disclosure promoted to a required acknowledgment. The v1
      asymmetry (shell approval-gated, pytest-on-host ungated) is removed.
  crit-fork-selection-metric:
    status: changed              # ADR-0018 — shared-prefix suite, integrity-checked
    step: "6.1"
    matrix_rows: ["B:test_pass_ratio"]
    tests:
      - "projects/eval-optimizer/tests/test_forking.py::test_untampered_full_pass_merges"
      - "projects/eval-optimizer/tests/test_forking.py::test_tampered_branch_disqualified"
      - "projects/eval-optimizer/tests/test_forking.py::test_e2e_tampering_branch_disqualified_via_real_overlays"
      - "projects/eval-optimizer/tests/test_forking.py::test_tie_break_fewest_errors_then_cost"
      - "projects/eval-optimizer/tests/test_forking.py::test_caller_supplied_suite_lands_in_shared_prefix"
      - "projects/eval-optimizer/tests/test_forking.py::test_parent_authors_suite_when_none_supplied"
    note: >-
      ADR-0018 (Accepted 2026-07-05): branches no longer grade themselves. The
      suite enters the fork once via the shared prefix (caller-supplied tests=
      or parent-authored pre-fork); branches implement against it and any
      branch whose overlay end-state touches tests/ or root pytest config is
      DISQUALIFIED (integrity check via the vendor's PUBLIC build_diff_report
      over live overlays — sees deletions the artifact mirror cannot; layer
      contract respected). Ranking among untampered full passes is a stated
      tie-break (fewest errors, then cost, then approach order) replacing v1's
      accidental first-listed-wins. Matrix B: test_pass_ratio field SHAPE
      identical, semantics now 'shared suite outcome'; tests_tampered is an
      ADDITIVE branch field.
  crit-flag-case-sensitivity:
    status: changed              # Phase 3.3 — unified _flag parser; EXECUTE=False now OFF
    step: "3.3"
    matrix_rows: ["A:web_tools-rule", "A:tracing-rule", "A:deferred-flags-rule"]
    tests:
      - "projects/agent-web/tests/test_settings_flags.py::test_flag_table"
      - "projects/agent-web/tests/test_settings_flags.py::test_execute_false_is_off"

  # ============================= Major ==============================
  crit-merge-threshold:
    status: changed              # ADR-0018 (6.1a) — mergeable iff untampered ratio == 1.0
    step: "6.1a"
    matrix_rows: ["B:any_viable"]
    tests:
      - "projects/eval-optimizer/tests/test_forking.py::test_partial_pass_no_longer_merges"
      - "projects/eval-optimizer/tests/test_forking.py::test_all_passes_tampered_aborts"
    note: >-
      any_viable defined numerically by ADR-0018: a branch merges iff its
      UNTAMPERED shared-suite ratio == 1.0 (binary vendor semantics = the
      whole suite passed; a future granular partial pass stays unmergeable
      without revisiting the ADR). v1's `>0` threshold is gone. Per ADR-0017,
      infrastructure failures raise and never shape any_viable.
  crit-silent-judge-fallback:
    status: changed              # 4.5 instrumented; policy RESOLVED by ADR-0017 (plan 6.2)
    step: "4.5"
    matrix_rows: ["B:selection_path", "E:errors"]
    tests:
      - "projects/eval-optimizer/tests/test_forking.py::test_selection_exception_aborts_loud"
      - "projects/eval-optimizer/tests/test_forking.py::test_selection_exception_never_materializes_winner_dir"
      - "projects/eval-optimizer/tests/test_forking.py::test_untampered_full_pass_merges"
    note: >-
      Phase 4.5 added selection_path + logging of the swallowed exception;
      ADR-0017 (Accepted 2026-07-05) then RETIRED the judge fallback from the
      programmatic path: a selection failure logs with traceback, aborts the
      fork (abort_fork — cancel branches, merge nothing), and RE-RAISES.
      selection_path keeps the 'judge_fallback' literal for schema stability
      (Matrix B additive-only); the value is historical and unreachable.
      Matrix E: failure paths emit the declared warning and no judge spans.
  crit-no-branch-cancel:
    status: changed              # Phase 4.6 — timeout cancels branches; winner-copy correctness
    step: "4.6"
    matrix_rows: ["B:winner_dir"]
    tests:
      - "projects/eval-optimizer/tests/test_forking.py::test_wait_timeout_cancels_outstanding_branches"
      - "projects/eval-optimizer/tests/test_forking.py::test_selection_exception_never_materializes_winner_dir"
      - "projects/eval-optimizer/tests/test_forking.py::test_save_winner_dir_copies_on_deterministic_win"
    note: >-
      Both 4.0 red-side pins flipped in this commit: (1) _wait_for_branches
      now explicitly terminates every still-running branch on timeout (vendor
      ForkCoordinator.terminate_branch, public method — no vendor edit) before
      returning for selection; (2) save_winner_dir copies ONLY when the
      deterministic merge path flushed the winner — never on the
      judge-fallback or abort paths. Matrix B winner_dir field SHAPE is
      identical (str | None); only the copy condition changed.
  crit-concurrent-history-clobber:
    status: changed              # Phase 4.4 — per-thread asyncio.Lock serializes load->run->save
    step: "4.4"
    matrix_rows: []
    tests:
      - "projects/agent-web/tests/test_e2e_agui.py::test_concurrent_posts_same_thread_both_persisted"
    note: >-
      The E2E test was committed and run RED against the pre-4.4 code first
      (v1 evidence: only the last save's message survived), then the lock
      landed in the same commit. history.load moved inside the lock so a
      queued request sees the previous run's saved history. In-process lock
      only — matches the single-server deployment (ADR-0012).
  crit-thread-slug-collision:
    status: changed              # Phase 4.3 — content-hash suffix for the collision class
    step: "4.3"
    matrix_rows: ["D:workspace-layout"]
    tests:
      - "projects/agent-web/tests/test_deps_factory.py::test_slug_distinguishes_slash_from_underscore"
      - "projects/agent-web/tests/test_deps_factory.py::test_slug_distinguishes_long_prefix_twins"
      - "projects/agent-web/tests/test_deps_factory.py::test_slug_sanitizes"
    note: >-
      3.6's strict-xfail red tests flipped green; markers removed in the 4.3
      commit as required. Slug rule: ids the sanitizer leaves untouched
      (<=64 chars) — the only ids a pure function can prove collision-free —
      keep their exact v1 directory; altered/truncated ids (the collision
      class) relocate once to sanitized[:48] + '-' + sha256(id)[:12]. Matrix D
      workspace-layout row re-pinned against the v1 baseline accordingly.
      Migration: Harness1 threads with exotic ids will not resume their old
      workspaces (accepted for the fork; clean/UUID-style ids unaffected).
  crit-nvidia-coupling:
    status: changed              # Phase 4.1 — lazy per-provider credential validation
    step: "4.1"
    matrix_rows: []
    tests:
      - "projects/eval-optimizer/tests/test_models.py::test_openrouter_only_env_constructs_settings_and_model"
      - "projects/eval-optimizer/tests/test_models.py::test_missing_openrouter_key_raises_naming_provider"
      - "projects/eval-optimizer/tests/test_models.py::test_missing_nvidia_key_raises_naming_provider"
      - "projects/eval-optimizer/tests/test_smoke.py::test_settings_constructs_without_provider_keys"
    note: >-
      Settings.from_env() no longer hard-fails on a missing NVIDIA key;
      build_model() raises a clear error naming the missing key for the
      provider the resolved model actually selects — including the previously
      SILENT empty OpenRouter key. check_connection.py re-entered the pyright
      scope (ISSUE-3 partially closed) with its type debt fixed.
  crit-toolset-frozen:
    status: changed              # Phase 4.7 — honest snapshot reporting (minimal-change option)
    step: "4.7"
    matrix_rows: ["D:debug-mcp-keys", "D:healthz-keys"]
    tests:
      - "projects/agent-web/tests/test_e2e_agui.py::test_debug_mcp_snapshot_matches_agent_toolsets"
      - "projects/agent-web/tests/test_e2e_agui.py::test_healthz_and_mcp_debug"
    note: >-
      The plan's honest-reporting option: /debug/mcp rows gain in_agent (the
      agent's startup toolset snapshot, recorded in lifespan where the
      toolsets are built) next to live registry status; /healthz gains
      frontend_mounted (the mount decision actually taken at app creation)
      next to the live frontend_built. Both additive-only — Matrix D key
      tests pass against the v1 baselines. Contract: no endpoint may report
      a state the agent doesn't have.

