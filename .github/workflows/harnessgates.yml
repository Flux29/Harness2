# Harness2 gate workflow — the machine-enforceable layer of HarnessRefactor.md
# Encodes Phase 0.3 (CI table) and Phase 0.5 (five gates). The plan's phases,
# ADR decisions, and exit-gate judgments remain human/Claude process — this file
# is what validates every PR regardless of where the work was authored
# (local Claude Code CLI, @claude-on-GitHub, or by hand).
#
# Rollout design: gate jobs that depend on scripts built in Phase 0.4/0.5
# (parity harness, manifest lints, dup-scan, import-lint, AST comparator) are
# guarded with hashFiles() so this workflow is green on the initial filtered
# commit and each gate arms itself the moment its script lands. No editing of
# this file is needed as phases progress.
#
# NOTE: the @claude interactive workflow (claude.yml) is a SEPARATE file,
# generated by running /install-github-app from Claude Code — do not merge it
# into this one. Live verification (Matrix E / Logfire) is deliberately absent:
# per the hybrid execution mode, it runs locally at gates 2, 5, and 6 with
# secrets from USER env vars, never from Actions secrets.

name: harness2-gates

on:
  pull_request:
    # labeled/unlabeled included so the label-gated ast-equality job (Gate 1)
    # arms the moment a `relocation`/`format-only` label is applied, without
    # needing a follow-up push.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gates-${{ github.ref }}
  cancel-in-progress: true

env:
  # From VENDOR.txt — fill the upstream repo URL when wiring vendor-integrity.
  UPSTREAM_PIN: f2224c5

jobs:
  # ---------------------------------------------------------------- lint ----
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Ruff (agent-web)
        run: uvx ruff check projects/agent-web
      - name: Ruff (eval-optimizer)
        run: uvx ruff check projects/eval-optimizer
      - name: Ruff (rules)
        run: uvx ruff check rules

  # ----------------------------------------------------------- typecheck ----
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Pyright (agent-web)
        working-directory: projects/agent-web
        run: |
          uv sync
          uvx pyright src
      - name: Pyright (eval-optimizer)
        working-directory: projects/eval-optimizer
        run: |
          uv sync
          uvx pyright src

  # ------------------------------------------- tests: Linux AND Windows ----
  # windows-latest exists specifically because the refactor is authored/merged
  # remotely but deployed on Windows — platform drift must fail PRs, not the
  # final local pull (exit gate 6).
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        project: [agent-web, eval-optimizer]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Sync and test (offline suite only — no network, no tokens)
        working-directory: projects/${{ matrix.project }}
        run: |
          uv sync
          uv run pytest -q

  # ------------------------------------------------------ frontend-build ----
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/agent-web/frontend/package-lock.json
      - name: Build (tsc + vite)
        working-directory: projects/agent-web/frontend
        run: |
          npm ci
          npm run build
      - name: "Publish dist as artifact (thin-CD: deployment pulls tagged artifacts)"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: projects/agent-web/frontend/dist

  # ----------------------------------------------------- vendor-integrity ----
  # Pristine-vendor rule + provenance: verify_core from each consumer venv,
  # patch presence, and (once the upstream URL is filled in) a shallow clone
  # of the pinned upstream commit for revendor_check.py — closing the gap the
  # parked .git left open.
  vendor-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Patch presence (branch_outcomes applied to features/forking)
        run: |
          grep -q "branch_outcomes" \
            vendor/pydantic-deepagents/pydantic_deep/features/forking/coordinator.py
      - name: verify_core from agent-web venv (offline checks)
        working-directory: projects/agent-web
        run: |
          uv sync
          uv run python ../../vendor/verify_core.py --offline || uv run python ../../vendor/verify_core.py
      - name: Provenance vs pinned upstream (arms when UPSTREAM_REPO is set)
        if: vars.UPSTREAM_REPO != ''
        run: |
          git clone --depth 50 "${{ vars.UPSTREAM_REPO }}" /tmp/upstream
          git -C /tmp/upstream checkout "$UPSTREAM_PIN"
          uv run python vendor/revendor_check.py --upstream /tmp/upstream

  # ------------------------------------------- Gate 2: manifest provenance ----
  # Lint one: every critique finding has a manifest entry; relocation sources
  # gone, targets present. Lint two: every `changed` entry names an existing,
  # passing test. Arms when parity/lint_manifest.py lands (Phase 0.5).
  manifest-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Gate 2 lints
        if: hashFiles('parity/lint_manifest.py') != ''
        run: uv run --directory projects/agent-web python ../../parity/lint_manifest.py
      - name: Gate not yet armed
        if: hashFiles('parity/lint_manifest.py') == ''
        run: echo "manifest-lint arms when parity/lint_manifest.py lands (Phase 0.5)"

  # --------------------------------------------- Gate 4: duplication scan ----
  # AST-hash duplication over first-party code vs parity/dup-allowlist.yml.
  # Allowlist is monotonic (may only shrink); expired dated entries fail.
  dup-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Gate 4 scan
        if: hashFiles('parity/dup_scan.py') != ''
        # --today arms the expiry check: a dated allowlist entry (e.g. 5.1's
        # dual-write) FAILS CI past its expiry — the deadline is real.
        run: uv run --directory projects/agent-web python ../../parity/dup_scan.py --allowlist parity/dup-allowlist.yml --today "$(date -u +%F)"
      - name: Gate not yet armed
        if: hashFiles('parity/dup_scan.py') == ''
        run: echo "dup-scan arms when parity/dup_scan.py lands (Phase 0.5)"

  # ---------------------------------------------- Gate 5: import contract ----
  # Circular-import detection + layer rules (live path never imports legacy;
  # agent_web never imports eval_optimizer; pydantic_deep only via public
  # surface, never the deprecated toolsets.forking shim).
  import-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Gate 5 check
        if: hashFiles('parity/import_lint.py') != ''
        run: uv run --directory projects/agent-web python ../../parity/import_lint.py --rules parity/layer-rules.yml
      - name: Gate not yet armed
        if: hashFiles('parity/import_lint.py') == ''
        run: echo "import-lint arms when parity/import_lint.py lands (Phase 0.5)"

  # ------------------------------------------- Gate 1: AST equality (cond) ----
  # Fires only on PRs labeled `relocation` or `format-only`: every moved or
  # reformatted function must AST-match its original (tier 2 equivalence).
  ast-equality:
    if: >-
      github.event_name == 'pull_request' &&
      (contains(github.event.pull_request.labels.*.name, 'relocation') ||
       contains(github.event.pull_request.labels.*.name, 'format-only'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - name: Gate 1 comparator (against merge base)
        run: |
          test -f parity/ast_equal.py || { echo "PR labeled relocation/format-only but parity/ast_equal.py missing"; exit 1; }
          uv run --directory projects/agent-web python ../../parity/ast_equal.py \
            --base "$(git merge-base origin/${{ github.base_ref }} HEAD)" \
            --manifest parity/manifest.yml

  # -------------------------------------------------- Gate 3: parity run ----
  # Behavioral parity vs committed v1 baselines (Matrices A-D; Matrix E is
  # live-only and runs locally). Required from Phase 2 per the plan; arms
  # automatically when baselines + harness exist.
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Parity harness vs baselines
        if: hashFiles('parity/conftest.py') != '' && hashFiles('baseline/**') != ''
        working-directory: projects/agent-web
        run: |
          uv sync
          uv run pytest -q ../../parity
      - name: Gate not yet armed
        if: hashFiles('parity/conftest.py') == ''
        run: echo "parity arms when the harness and baselines land (Phase 0.4)"

  # ------------------------------------------------------------- doc-grep ----
  # Phase 2 exit gate: keep the fixed doc drift (glm-5.1, NVIDIA-hosted, and
  # port 8000 in living docs) from silently returning. Scope + patterns live in
  # parity/doc_grep.py, which deliberately skips ADRs, the plan/critique, and the
  # frozen HANDOFF.
  doc-grep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Living-doc drift check
        run: python3 parity/doc_grep.py

  # --------------------------------------------------------- secrets-scan ----
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Personal-path / contamination grep (plan step 1.5)
        run: |
          # NOTE: this job's own file carries the search patterns (including the
          # literal 'pollm'), so it must exclude itself or it flags its own
          # signatures. EXCLUSIONS.md documents the same paths for auditability
          # and is likewise excluded.
          ! grep -rn --include='*.py' --include='*.md' --include='*.yml' --include='*.ps1' \
            -e 'C:\\Users\\' -e 'pollm' -e 'E:\\Schema' \
            --exclude-dir=vendor --exclude-dir=.git --exclude-dir=baseline . \
            --exclude=HarnessRefactor.md --exclude=HarnessCritique.md \
            --exclude=harnessgates.yml --exclude=EXCLUSIONS.md . \
            || { echo 'Personal environment details found (plan step 1.5 / EXCLUSIONS policy)'; exit 1; }
